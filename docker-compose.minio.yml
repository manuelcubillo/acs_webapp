# MinIO for local development.
#
# Brings up an S3-compatible object store and a one-shot init container that
# creates the bucket and applies the dev CORS / public-read policy.
#
# Usage:
#   docker compose -f docker-compose.minio.yml up -d
#   open http://localhost:9001         # console: minioadmin / minioadmin
#
# Env vars expected by the app (.env.local):
#   STORAGE_DRIVER=minio
#   S3_ENDPOINT=http://localhost:9000
#   S3_REGION=us-east-1
#   S3_BUCKET=acs-photos
#   S3_ACCESS_KEY_ID=minioadmin
#   S3_SECRET_ACCESS_KEY=minioadmin
#   S3_FORCE_PATH_STYLE=true

services:
  minio:
    image: minio/minio:latest
    container_name: acs-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio-init:
    image: minio/mc:latest
    container_name: acs-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/acs-photos &&
      mc anonymous set download local/acs-photos &&
      mc cors set /policies/cors.json local/acs-photos
      "
    volumes:
      - ./infra/storage/minio-cors.json:/policies/cors.json:ro

volumes:
  minio-data:
